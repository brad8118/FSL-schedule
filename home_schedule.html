<!DOCTYPE html>
<html>
  <head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="mock_league_schedule.js"></script>

    <script type="text/javascript">
      const dayOfWeekLookup = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const WEEKEND_JM_FIELDS = ["JM1", "JM2", "JM3", "JM4", "JM5", "JM6"];

      $(document).ready(function () {
        if (typeof getTestRequest == "undefined") {
          $("#btnFetchFromMock").hide();
          fetchDataOnLoad();
        }
      });

      function populateTableFromMockData() {
        var response = getTestRequest();
        populateTableWithGames(response.values, [], []);
      }

      function fetchDataOnLoad() {
        $.when(getAjax_fetchGamesFromSheet(), getAjax_fetchCameraFromSheet(), getAjax_fetchDedicatedCamerasFromSheet()).done(function (games, camera, dedicatedCameras) {
          populateTableWithGames(games[0].values, camera[0].values, dedicatedCameras[0].values);
        });
      }

      function getAjax_fetchGamesFromSheet() {
        let spreadsheetId = "1W6564quxDmCBcgst1fCNtjo9MAxTgUB2ITRxtHR0QMU";
        let range = "league_schedule";
        let apiKey = "AIzaSyBvV43w6Zu3mpvKhTbn-Flh5jlc-7uzL5Y";
        let url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`;

        return $.ajax({
          type: "GET",
          url: url,
          cache: false,
          data: "",
        });
      }

      function getAjax_fetchCameraFromSheet() {
        let spreadsheetId = "1cFZTmUQS9E8yCpPR7NiSEnRy3QPGTwziw4I83vY52xA";
        let apiKey = "AIzaSyA46O2IahxdN4TVVhEwg5VWGx73aoZ2edk";
        let range = "camera";
        let url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`;

        return $.ajax({
          type: "GET",
          url: url,
          cache: false,
          data: "",
        });
      }

      function getAjax_fetchDedicatedCamerasFromSheet() {
        let spreadsheetId = "1cFZTmUQS9E8yCpPR7NiSEnRy3QPGTwziw4I83vY52xA";
        let apiKey = "AIzaSyA46O2IahxdN4TVVhEwg5VWGx73aoZ2edk";
        let range = "DedicatedCameras";
        let url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`;

        return $.ajax({
          type: "GET",
          url: url,
          cache: false,
          data: "",
        });
      }

      function convert2DArrayToJson(json) {
        let data = json;
        let keys = data.shift();
        return data.map((row) => Object.assign({}, ...row.map((x, i) => ({ [keys[i]]: x }))));
      }

      function groupBy(data, groupByAttribute) {
        return data.reduce(function (obj, item) {
          obj[item[groupByAttribute]] = obj[item[groupByAttribute]] || [];
          obj[item[groupByAttribute]].push(item);
          return obj;
        }, {});
      }

      function showOldGamesCkbChange() {
        if (typeof getTestRequest == "undefined") {
          fetchDataOnLoad();
        } else {
          populateTableFromMockData();
        }
      }

      function populateTableWithGames(games, camera, dedicatedCameras) {
        let cameraSchedule = camera && camera.length ? convert2DArrayToJson(camera) : [];
        let dedicatedCameraRows = dedicatedCameras && dedicatedCameras.length ? dedicatedCameras : [];
        var converted = convert2DArrayToJson(games);

        if (!$("#ckbShowPastGames").is(":checked")) {
          converted = converted.filter(function (v) {
            let now = new Date();
            now.setHours(0, 0, 0, 0);
            return new Date(v.date).getTime() >= now.getTime();
          });
        }

        let homeGames = converted.filter((v) => v.homeGame === "HOME");
        homeGames.forEach((g) => {
          g.date = new Date(g.date).toLocaleDateString("en-US");
        });

        homeGames.sort((a, b) => new Date(a.date) - new Date(b.date));

        var gamesGroupedByDate = groupBy(homeGames, "date");

        $("#testTbl").html("");
        for (var key in gamesGroupedByDate) {
          buildGameTableByRules(gamesGroupedByDate[key], cameraSchedule, dedicatedCameraRows);
        }
      }

      function buildGameTableByRules(gamesByDate, cameraSchedule, dedicatedCameras) {
        if (!gamesByDate || gamesByDate.length === 0) {
          return;
        }

        gamesByDate.sort((a, b) => toDateTime(a.date, a.time) - toDateTime(b.date, b.time));

        const dateStr = gamesByDate[0].date;
        const dateObj = new Date(dateStr);
        const dayOfWeek = dateObj.getDay();
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

        const groupByDate = $("<div/>");
        const formattedDate = dateObj.toLocaleString().split(",")[0];
        groupByDate.append(`<div class="groupedByDate">${dayOfWeekLookup[dayOfWeek]}, ${formattedDate}</div>`);

        const scheduledGames = gamesByDate.filter((g) => g.time && g.time.trim() !== "" && g.fieldNum && g.fieldNum.trim() !== "");
        const unscheduledGames = gamesByDate.filter((g) => !g.time || g.time.trim() === "" || !g.fieldNum || g.fieldNum.trim() === "");

        if (unscheduledGames.length > 0) {
          const labels = unscheduledGames
            .map((g) => `(${g.leagueType} #${g.matchNum}) ${g.freeholdTeam}`)
            .join(", ");
          groupByDate.append(`<div class="gamesNotScheduled"><b>Games Not Scheduled yet:</b> ${labels}</div>`);
        }

        if (scheduledGames.length === 0) {
          groupByDate.append('<div class="emptyDate">No scheduled home games for this day.</div>');
          $("#testTbl").append(groupByDate);
          return;
        }

        const normalizedGames = scheduledGames.map((g) => normalizeGame(g));
        const fields = getFieldsForDate(normalizedGames, isWeekend);
        const timeWindow = getTimeWindowForDate(normalizedGames, dateObj, isWeekend);
        const slots = build15MinuteSlots(timeWindow.start, timeWindow.end);

        const table = $("<table/>");
        const tableHead = $("<thead/>");
        const headRow = $("<tr/>");
        const tableBody = $("<tbody/>");

        headRow.append("<th>Time</th>");
        fields.forEach((field) => headRow.append(`<th>${getFieldHeaderLabel(field)}</th>`));
        tableHead.append(headRow);

        const gamesByField = {};
        fields.forEach((f) => {
          gamesByField[f] = normalizedGames
            .filter((g) => g.fieldNum.toUpperCase() === f.toUpperCase())
            .sort((a, b) => a.start - b.start);
        });

        const clustersByField = {};
        fields.forEach((f) => {
          clustersByField[f] = getOverlapClusters(gamesByField[f]);
        });

        const displayIntervalsByField = {};
        const linkedShadeIntervalsByField = getLinkedShadeIntervalsByField(normalizedGames, fields, clustersByField);
        fields.forEach((f) => {
          displayIntervalsByField[f] = [
            ...clustersByField[f].map((cluster) => ({
              type: "game",
              start: cluster.start,
              end: cluster.end,
              cluster,
            })),
            ...linkedShadeIntervalsByField[f],
          ].sort((a, b) => a.start - b.start);
        });

        const coverUntilByField = {};
        fields.forEach((f) => {
          coverUntilByField[f] = null;
        });

        slots.forEach((slotStart) => {
          const isHourRow = slotStart.getMinutes() === 0;
          const rowClass = isHourRow ? "slotRow hourRow" : "slotRow quarterRow";
          const tr = $(`<tr class="${rowClass}"/>`);
          if (isHourRow) {
            tr.append(`<td class="timeCol" rowspan="4">${formatTime(slotStart)}</td>`);
          }

          fields.forEach((field) => {
            if (coverUntilByField[field] && slotStart < coverUntilByField[field]) {
              return;
            }

            const interval = displayIntervalsByField[field].find((item) => item.start.getTime() === slotStart.getTime());

            if (interval) {
              const rowSpan = Math.max(1, Math.ceil((interval.end.getTime() - interval.start.getTime()) / (15 * 60 * 1000)));
              const td = interval.type === "game" ? buildClusterCell(interval.cluster, rowSpan, cameraSchedule, dedicatedCameras) : buildLinkedShadeCell(interval, rowSpan);
              tr.append(td);

              coverUntilByField[field] = new Date(interval.end);
            } else {
              tr.append('<td class="emptyCell">-</td>');
            }
          });

          tableBody.append(tr);
        });

        table.append(tableHead);
        table.append(tableBody);
        groupByDate.append(table);
        $("#testTbl").append(groupByDate);
      }

      function normalizeGame(game) {
        const field = (game.fieldNum || "").toUpperCase().trim();
        const start = toDateTime(game.date, game.time);
        const durationMin = getGameDurationMinutes(field, game.leagueType, game.year);
        const end = new Date(start);
        end.setMinutes(end.getMinutes() + durationMin);

        return {
          ...game,
          fieldNum: field,
          start,
          end,
          durationMin,
        };
      }

      function getOverlapClusters(games) {
        if (!games || games.length === 0) return [];
        const sorted = [...games].sort((a, b) => a.start - b.start);
        const clusters = [];
        sorted.forEach((game) => {
          const last = clusters[clusters.length - 1];
          if (last && game.start.getTime() < last.end.getTime()) {
            last.games.push(game);
            if (game.end.getTime() > last.end.getTime()) {
              last.end = new Date(game.end);
            }
          } else {
            clusters.push({ start: new Date(game.start), end: new Date(game.end), games: [game] });
          }
        });
        return clusters;
      }

      function getLinkedFields(fieldNum) {
        const field = (fieldNum || "").toUpperCase().trim();

        if (field === "OP4") return ["OP4A", "OP4C"];
        if (field === "OP5") return ["OP5A", "OP5C"];
        if (field === "OP6") return ["OP6A", "OP6C"];
        if (field === "OP4A" || field === "OP4C") return ["OP4"];
        if (field === "OP5A" || field === "OP5C") return ["OP5"];
        if (field === "OP6A" || field === "OP6C") return ["OP6"];

        return [];
      }

      function mergeIntervals(intervals) {
        if (!intervals || intervals.length === 0) return [];

        const sorted = [...intervals].sort((a, b) => a.start - b.start);
        const merged = [{ ...sorted[0], sources: [...(sorted[0].sources || [])] }];

        for (let i = 1; i < sorted.length; i++) {
          const current = sorted[i];
          const last = merged[merged.length - 1];

          if (current.start.getTime() <= last.end.getTime()) {
            if (current.end.getTime() > last.end.getTime()) {
              last.end = new Date(current.end);
            }
            const combinedSources = new Set([...(last.sources || []), ...(current.sources || [])]);
            last.sources = [...combinedSources].sort();
          } else {
            merged.push({ ...current, sources: [...(current.sources || [])] });
          }
        }

        return merged;
      }

      function subtractIntervals(interval, blockers) {
        if (!blockers || blockers.length === 0) {
          return [{ start: new Date(interval.start), end: new Date(interval.end), sources: [...(interval.sources || [])] }];
        }

        let segments = [{ start: new Date(interval.start), end: new Date(interval.end), sources: [...(interval.sources || [])] }];

        blockers.forEach((blocker) => {
          const nextSegments = [];

          segments.forEach((segment) => {
            if (blocker.end.getTime() <= segment.start.getTime() || blocker.start.getTime() >= segment.end.getTime()) {
              nextSegments.push(segment);
              return;
            }

            if (blocker.start.getTime() > segment.start.getTime()) {
              nextSegments.push({
                start: new Date(segment.start),
                end: new Date(blocker.start),
                sources: [...segment.sources],
              });
            }

            if (blocker.end.getTime() < segment.end.getTime()) {
              nextSegments.push({
                start: new Date(blocker.end),
                end: new Date(segment.end),
                sources: [...segment.sources],
              });
            }
          });

          segments = nextSegments;
        });

        return segments;
      }

      function getLinkedShadeIntervalsByField(games, fields, clustersByField) {
        const fieldSet = new Set(fields.map((field) => field.toUpperCase()));
        const rawIntervalsByField = {};

        fields.forEach((field) => {
          rawIntervalsByField[field] = [];
        });

        games.forEach((game) => {
          const linkedFields = getLinkedFields(game.fieldNum).filter((field) => fieldSet.has(field));

          linkedFields.forEach((field) => {
            rawIntervalsByField[field].push({
              start: new Date(game.start),
              end: new Date(game.end),
              sources: [game.fieldNum],
            });
          });
        });

        const shadeIntervalsByField = {};
        fields.forEach((field) => {
          const mergedRawIntervals = mergeIntervals(rawIntervalsByField[field]);
          const actualIntervals = (clustersByField[field] || []).map((cluster) => ({ start: cluster.start, end: cluster.end }));
          const remainingSegments = mergedRawIntervals.flatMap((interval) => subtractIntervals(interval, actualIntervals));

          shadeIntervalsByField[field] = mergeIntervals(remainingSegments).map((interval) => ({
            type: "linkedShade",
            start: interval.start,
            end: interval.end,
            sources: interval.sources,
          }));
        });

        return shadeIntervalsByField;
      }

      function buildLinkedShadeCell(interval, rowSpan) {
        const sourceLabel = (interval.sources || []).join(", ");
        const td = $(`<td class="linkedShadeCell" rowspan="${rowSpan}" title="Blocked because of a game on ${sourceLabel}"></td>`);
        if (sourceLabel) {
          td.append(`<div class="linkedShadeLabel">Blocked by ${sourceLabel}</div>`);
        }
        return td;
      }

      function buildClusterCell(cluster, rowSpan, cameraSchedule, dedicatedCameras) {
        function resolveCamera(g) {
          let camera = getCamera(cameraSchedule, g.time, g.date, g.fieldNum);
          if (camera === "") {
            const dedicated = dedicatedCameras.find((c) => g.freeholdTeam.includes(c[0]));
            if (dedicated) camera = dedicated[1].toUpperCase();
          }
          return camera;
        }

        function buildTooltip(g) {
          let tip = `vs ${g.opponent} | #${g.matchNum} | ${g.leagueType}`;
          if ((g.matchNum || "").includes("HOLDER")) tip += "\nWaiting for game to approved in GotSport";
          if ((g.matchNum || "").includes("CHANGE_REQUEST")) tip += "\nGame is planned to be moved, waiting approval in GotSport";
          return tip;
        }

        if (cluster.games.length === 1) {
          const g = cluster.games[0];
          let tdClass = "gameCell";
          const camera = resolveCamera(g);
          if (camera !== "") tdClass += ` ${camera}`;
          if ((g.matchNum || "").includes("HOLDER")) tdClass += " HOLDER";
          if ((g.matchNum || "").includes("CHANGE_REQUEST")) tdClass += " CHANGE_REQUEST";
          return $(`<td class="${tdClass}" rowspan="${rowSpan}" title="${buildTooltip(g)}">${g.freeholdTeam} (${g.year})</td>`);
        }

        const td = $(`<td class="overlapContainerCell" rowspan="${rowSpan}"></td>`);
        const flex = $('<div class="sideBySideGames"></div>');

        const clusterDuration = cluster.end.getTime() - cluster.start.getTime();
        const n = cluster.games.length;
        const MIN_PANEL_WIDTH = 120;
        td.css('min-width', (n * MIN_PANEL_WIDTH) + 'px');

        cluster.games.forEach((g, i) => {
          let panelClass = "gamePanel";
          const camera = resolveCamera(g);
          if (camera !== "") panelClass += ` ${camera}`;
          if ((g.matchNum || "").includes("HOLDER")) panelClass += " HOLDER";
          if ((g.matchNum || "").includes("CHANGE_REQUEST")) panelClass += " CHANGE_REQUEST";

          const topPct = ((g.start.getTime() - cluster.start.getTime()) / clusterDuration) * 100;
          const heightPct = ((g.end.getTime() - g.start.getTime()) / clusterDuration) * 100;
          const leftPct = (i / n) * 100;
          const widthPct = 100 / n;

          const timeLabel = g.start.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
          const panel = $(`<div class="${panelClass}" title="${buildTooltip(g)}"></div>`);
          panel.css({ top: topPct + "%", height: heightPct + "%", left: leftPct + "%", width: widthPct + "%" });
          panel.append(`<div class="gamePanelTime">${timeLabel}</div>`);
          panel.append(`<div class="gamePanelTeam">${g.freeholdTeam} (${g.year})</div>`);
          flex.append(panel);
        });

        td.append(flex);
        return td;
      }

      function getCamera(cameraSchedule, time, date, field) {
        let cameraOnField = cameraSchedule.find(function (c) {
          let gameTime = time.replaceAll(" ", "").toUpperCase();
          let cameraTime = c.time.replaceAll(" ", "").toUpperCase();
          let gameField = field.replaceAll(" ", "").toUpperCase();
          let cameraField = c.field.replaceAll(" ", "").toUpperCase();

          return c.date == date && cameraTime == gameTime && gameField == cameraField;
        });

        if (cameraOnField) {
          return cameraOnField.camera.toUpperCase().replaceAll(" ", "");
        }

        return "";
      }

      function getGameDurationMinutes(fieldNum, leagueType, year) {
        if ((leagueType || "").toLowerCase().includes("2hour")) {
          return 120;
        }
        const ageMatch = (year || "").match(/U?(\d+)[BG]/i);
        if (ageMatch && parseInt(ageMatch[1], 10) >= 18) {
          return 120;
        }
        const f = (fieldNum || "").toUpperCase();
        if (f === "JM1" || /^OP\d$/.test(f)) {
          return 90;
        }
        return 75;
      }

      function getFieldHeaderLabel(fieldNum) {
        const size = getFieldSize(fieldNum);
        if (size === "") {
          return fieldNum;
        }

        return `${fieldNum}<br /><span class="fieldSize">${size}</span>`;
      }

      function getFieldSize(fieldNum) {
        const f = (fieldNum || "").toUpperCase();

        if (["JM2", "JM3", "JM4"].includes(f)) {
          return "7v7";
        }

        if (["JM5", "JM6"].includes(f)) {
          return "9v9";
        }
        
        if (["JM5", "JM6", "OP4A", "OP4C", "OP5A", "OP5C", "OP6A", "OP6C"].includes(f)) {
          return "7v7 / 9v9";
        }

        if (["JM1", "OP4", "OP5", "OP6"].includes(f)) {
          return "11v11";
        }

        return "";
      }

      function getFieldsForDate(games, isWeekend) {
        const gameFields = [...new Set(games.map((g) => g.fieldNum).filter((f) => f && f !== ""))];
        const relatedFields = new Set(gameFields);

        gameFields.forEach((field) => {
          getLinkedFields(field).forEach((linkedField) => relatedFields.add(linkedField));
        });

        const fieldsToShow = [...relatedFields];

        if (isWeekend) {
          const extras = fieldsToShow.filter((f) => !WEEKEND_JM_FIELDS.includes(f));
          return WEEKEND_JM_FIELDS.concat(extras.sort(compareFields));
        }

        return fieldsToShow.sort(compareFields);
      }

      function compareFields(a, b) {
        const rankA = getFieldPrefixRank(a);
        const rankB = getFieldPrefixRank(b);
        if (rankA !== rankB) {
          return rankA - rankB;
        }

        const parsedA = parseFieldSuffix(a);
        const parsedB = parseFieldSuffix(b);

        if (parsedA.number !== parsedB.number) {
          return parsedA.number - parsedB.number;
        }

        return parsedA.suffix.localeCompare(parsedB.suffix);
      }

      function getFieldPrefixRank(field) {
        const upper = (field || "").toUpperCase();
        if (upper.startsWith("JM")) return 0;
        if (upper.startsWith("OP")) return 1;
        if (upper.startsWith("MJT")) return 2;
        if (upper.startsWith("WFS")) return 3;
        return 4;
      }

      function parseFieldSuffix(field) {
        const upper = (field || "").toUpperCase();
        const stripped = upper.replace(/^(JM|OP|MJT|WFS)/, "");
        const match = stripped.match(/^(\d+)(.*)$/);
        if (!match) {
          return { number: Number.MAX_SAFE_INTEGER, suffix: stripped };
        }

        return {
          number: parseInt(match[1], 10),
          suffix: match[2] || "",
        };
      }

      function getTimeWindowForDate(games, dateObj, isWeekend) {
        const start = new Date(dateObj);
        const end = new Date(dateObj);

        if (isWeekend) {
          start.setHours(8, 0, 0, 0);
          end.setHours(18, 0, 0, 0);
        } else {
          start.setHours(17, 0, 0, 0);
          end.setHours(22, 0, 0, 0);
        }

        const earliestGameStart = new Date(Math.min(...games.map((g) => g.start.getTime())));
        const latestGameEnd = new Date(Math.max(...games.map((g) => g.end.getTime())));

        const expandedStart = floorToHour(earliestGameStart);
        const expandedEnd = ceilToHour(latestGameEnd);

        if (expandedStart < start) {
          start.setTime(expandedStart.getTime());
        }

        if (expandedEnd > end) {
          end.setTime(expandedEnd.getTime());
        }

        return { start, end };
      }

      function build15MinuteSlots(start, end) {
        const slots = [];
        const cursor = new Date(start);

        while (cursor < end) {
          slots.push(new Date(cursor));
          cursor.setMinutes(cursor.getMinutes() + 15);
        }

        return slots;
      }

      function floorToHour(date) {
        const d = new Date(date);
        d.setMinutes(0, 0, 0);
        return d;
      }

      function ceilToHour(date) {
        const d = new Date(date);
        if (d.getMinutes() !== 0 || d.getSeconds() !== 0 || d.getMilliseconds() !== 0) {
          d.setHours(d.getHours() + 1);
        }
        d.setMinutes(0, 0, 0);
        return d;
      }

      function toDateTime(dateStr, timeStr) {
        return new Date(`${dateStr} ${timeStr}`);
      }

      function formatTime(date) {
        if (date.getMinutes() !== 0) {
          return "";
        }
        return date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
      }
    </script>
